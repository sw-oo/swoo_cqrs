server:
  port: 8081

spring:
  application:
    name: board_command
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.example.board_command: debug
    org.hibernate.sql: debug
    org.hibernate.orm.jdbc.bind: trace