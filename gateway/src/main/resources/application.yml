spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: board_command
              uri: http://localhost:8081
              predicates:
                - Path=/board/reg, /board/update, /board/delete

            - id: board_query
              uri: http://localhost:8082
              predicates:
                - Path=/board/list, /board/read/**